meta:
  id: dhanurasana
  version: 1
  status: draft
  author:
  last_reviewed:
  source: Yoga Maya curriculum

identity:
  sanskrit_name:
    devanagari: धनुरासन
    transliteration: Dhanurāsana
  etymology:
    - root: dhanu
      meaning: bow
    - root: asana
      meaning: pose / posture
  english_name: Bow Pose
  pronunciation: dah-noor-AH-sah-nah

classification:
  primary_class: Back Bend
  secondary_class:
  anatomy:
    - Spinal extension
    - Hip extension
    - Shoulder extension
    - Chest opening
    - Hip flexor stretch
    - Quadriceps stretch
    - Abdominal stretch

practice:
  entry_cues:
    - from: Adho Mukha Svanasana
      cue: Lower to your belly, bend your knees, reach back for your ankles
    - from: Salabhasana
      cue: Bend your knees, reach back, grasp your ankles
    - from: Bhujangasana
      cue: Lower your chest, bend your knees, hold your ankles
    - from: Balasana
      cue: Slide forward onto your belly, bend your knees, reach back
    - from: Prone position
      cue: Bend your knees, reach back, hold your ankles

  hold_exploration:
    - Press your feet into your hands
    - Peel your chest open
    - Lift your thighs higher off the mat
    - Roll your shoulders back
    - Reach the crown of your head forward
    - Can you breathe into your back body?

  exit_cues:
    - to: Prone position
      cue: Release your ankles, lower your chest and thighs to the mat
    - to: Balasana
      cue: Release, press back to Child's Pose
    - to: Adho Mukha Svanasana
      cue: Release, press up and back to Down Dog
    - to: Salabhasana
      cue: Release your ankles, keep your chest and legs lifted

  suggested_hold_duration: 5 breaths

accessibility:
  - condition: Tight quadriceps or hip flexors
    modifications:
      - Loop a strap around each ankle and hold the strap instead
      - Lift one leg at a time (Half Bow / Ardha Dhanurasana)
      - Skip and do Salabhasana instead
  - condition: Lower back sensitivity or injury
    modifications:
      - Keep your knees hip-width apart and lift gently
      - Lift only the chest without grasping the ankles
      - Skip and do Salabhasana instead
  - condition: Pregnancy
    modifications:
      - Skip and do supported Bhujangasana over a bolster instead
      - Skip and do a gentle seated back bend instead
  - condition: Recent abdominal surgery
    modifications:
      - Skip and do supported Setu Bandhasana instead
  - condition: Shoulder injury
    modifications:
      - Use a strap around the ankles to reduce shoulder rotation
      - Reach for one ankle at a time
      - Skip and do Salabhasana instead

variations:
  - Parsva Dhanurasana — roll to one side, hold the pose, then roll to the other
  - Lift higher with each inhale, deepening the arch
  - Cross your arms to clasp opposite ankles
  - Rock forward and back in the pose, generating heat in the front body

relationships:
  entry_transitions:
    - Salabhasana
    - Bhujangasana
    - Adho Mukha Svanasana
    - Balasana
  exit_transitions:
    - Balasana
    - Adho Mukha Svanasana
    - Salabhasana

media:
  images:
    - path:
      alt: A practitioner lying prone on a yoga mat, knees bent, hands grasping the ankles, with chest, thighs, and head lifted off the mat in a curved bow shape
