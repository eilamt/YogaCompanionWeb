meta:
  id: balasana
  version: 1
  status: draft
  author: Tamar
  last_reviewed: 2026-05-11
  source: Yoga Maya curriculum

identity:
  sanskrit_name:
    devanagari: बालासन
    transliteration: Bālāsana
  etymology:
    - root: bala
      meaning: child
    - root: asana
      meaning: pose / posture
  english_name: Child's Pose
  pronunciation: bah-LAHS-uh-nuh

classification:
  primary_class: Seated Forward Bend
  secondary_class:
  anatomy:
    - Hip flexion (deep, passive)
    - Knee flexion (full)
    - Ankle plantar flexion
    - Spinal flexion (gentle, passive)
    - Shoulder flexion (when arms extend forward)
    - Latissimus dorsi stretch
    - Erector spinae lengthening
    - Gluteus maximus stretch
    - Tibialis anterior stretch (tops of the feet)

practice:
  entry_cues:
    - from: Vajrasana
      cue: Separate your knees. Fold forward.

  hold_exploration:
    - label: Side body stretch
      steps:
        - Reach your hands forward along the mat
        - Walk your fingertips over to the right edge of the mat
        - Drag your fingertips back through center and over to the left
        - Return to center

    - label: Thread the needle
      steps:
        - Walk both hands over to the right side of the mat
        - Thread your left arm underneath your right armpit, out to the opposite side
        - Rest your left shoulder and left ear on the mat
        - Let your chest rotate open
        - Return to center and repeat on the other side

    - label: Revolved Child pose
      steps:
        - Walk both hands over to the right side of the mat
        - Slide your right hand out wide, past your right shoulder
        - Press the floor away with your right hand and rotate your chest open
        - Return to center and repeat on the other side

  exit_cues:
    - to: Adho Mukha Svanasana
      cue: Tuck your toes, press your hands down, lift your hips to Down Dog

  suggested_hold_duration: 5–10 breaths

accessibility:
  - condition: Tight ankles / sore tops of feet
    modifications:
      - Roll a blanket under your ankles
      - Place a folded blanket under the tops of your feet

  - condition: Hips don't reach the heels / knees won't close fully
    modifications:
      - Place a bolster lengthwise between your calves and thighs
      - Rest your torso along a bolster running under your sternum
      - Skip and do supported Supta Baddha Konasana instead

  - condition: Knee pain in deep flexion
    modifications:
      - Fold a blanket and place it behind the knees to reduce the joint angle
      - Widen the knees and bring the big toes to touch (reduces knee flexion load)
      - Skip and do supported Supta Baddha Konasana instead

  - condition: Pregnancy (2nd / 3rd trimester)
    modifications:
      - Widen your knees so your belly rests between your thighs
      - Place a bolster vertically under your chest for support

variations:
  - Extend the arms long and lift the elbows off the mat for an active shoulder stretch
  - Lift the hips up over the knees into Puppy Pose (Uttana Shishosana) for deeper shoulder flexion

relationships:
  entry_transitions:
    - Vajrasana
  exit_transitions:
    - Adho Mukha Svanasana

